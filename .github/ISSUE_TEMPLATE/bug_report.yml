name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please provide as much information as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Provide a clear and concise description of the issue.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Help us reproduce the issue.
      placeholder: |
        1. Go to...
        2. Click on...
        3. Scroll down to...
        4. Observe the issue...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How serious is this issue?
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: Add screenshots, GIFs, or recordings if applicable.

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome, Firefox, Edge, Safari, etc.

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Windows 11, Ubuntu 24.04, macOS Sequoia, etc.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any extra information that might help us investigate the issue.
